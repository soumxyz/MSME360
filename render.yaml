services:
  - type: web
    name: msme360-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: CORS_ALLOW_ORIGINS
        value: https://msme360-vert.vercel.app,https://msme360.vercel.app,http://localhost:5173
      - key: JWT_SECRET
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard
    healthCheckPath: /docs
